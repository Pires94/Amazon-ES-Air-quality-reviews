<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Evaluación Experta 2024</title>
    <meta name="description" content="{{ description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --amazon-navy: #131921;
            --amazon-orange: #FF9900;
            --amazon-orange-hover: #e68a00;
            --bg-gray: #f4f6f8;
            --text-main: #111827;
            --text-muted: #4b5563;
            --border-light: #e5e7eb;
            --accent-red: #dc2626;
            --accent-green: #16a34a;
            --trust-blue: #2563eb;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-main);
            margin: 0; padding: 0;
            line-height: 1.7;
        }
        header {
            background: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--amazon-orange);
            position: sticky;
            top: 0; z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .logo { font-family: 'Outfit'; font-weight: 800; font-size: 1.6rem; color: var(--amazon-navy); text-decoration: none; display:flex; align-items:center; gap:8px;}
        .logo span { color: var(--amazon-orange); }
        .trust-badge { font-size: 0.8rem; font-weight: 600; color: var(--trust-blue); background: #eff6ff; padding: 4px 8px; border-radius: 4px; display:inline-flex; align-items:center; gap:4px;}
        
        main { max-width: 900px; margin: 2rem auto; padding: 0 1.2rem; }
        .article-card { background: white; border-radius: 12px; padding: 3rem 6%; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        
        h1 { font-family: 'Outfit'; font-size: 2.8rem; line-height: 1.15; margin: 0 0 1rem 0; color: #000; letter-spacing: -0.02em; }
        h2 { font-family: 'Outfit'; font-size: 1.8rem; margin: 3rem 0 1.5rem 0; color: var(--amazon-navy); }
        h3 { font-family: 'Outfit'; font-size: 1.4rem; color: var(--text-main); }
        
        .expert-meta { display: flex; align-items: center; gap: 15px; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border-light); font-size: 0.9rem; color: var(--text-muted); }
        .expert-meta img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        
        /* Typography */
        p { font-size: 1.05rem; margin-bottom: 1.5rem; }
        strong { font-weight: 600; color: #000; }
        
        /* Special Blocks */
        .authority-block { background: #eff6ff; border-left: 4px solid var(--trust-blue); padding: 1.5rem; margin: 2rem 0; border-radius: 0 8px 8px 0; }
        .authority-block h4 { color: var(--trust-blue); margin: 0 0 0.5rem 0; display: flex; align-items: center; gap: 8px; font-size: 1.1rem; }
        
        .warning-block { background: #fef2f2; border-left: 4px solid var(--accent-red); padding: 1.5rem; margin: 2rem 0; border-radius: 0 8px 8px 0; }
        .warning-block h4 { color: var(--accent-red); margin: 0 0 0.5rem 0; display: flex; align-items: center; gap: 8px; font-size: 1.1rem; }
        
        .insight-block { background: #f8fafc; border: 1px solid var(--border-light); padding: 1.5rem; margin: 2rem 0; border-radius: 8px; position:relative; }
        .insight-badge { position: absolute; top: -12px; left: 24px; background: #64748b; color: white; padding: 2px 10px; font-size: 0.8rem; font-weight: bold; border-radius: 4px; text-transform: uppercase;}
        
        /* Layout */
        .content-body { margin-top: 2rem; }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .article-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <a href="../index.html" class="logo">Expertos<span>Aire</span></a>
        <div class="trust-badge">✓ Análisis Independiente</div>
    </header>
    <main>
        <article class="article-card">
            <h1>{{ h1 }}</h1>
            <div class="expert-meta">
                <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=100&q=80" alt="Experto">
                <div>
                    <div><strong>Analizado por el Equipo Técnico</strong></div>
                    <div>Actualizado: {{ date }} • Lectura de 5 min</div>
                </div>
            </div>
            
            {{ atf_box }}
            
            <div class="content-body">
                {{ content }}
            </div>
        </article>
    </main>
</body>
</html>
