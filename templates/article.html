<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Expertos Aire</title>
    <meta name="description" content="{{ description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --amazon-navy: #131921;
            --amazon-orange: #FF9900;
            --amazon-orange-hover: #e68a00;
            --bg-gray: #f8f9fa;
            --text-main: #1a1a1a;
            --text-muted: #565959;
            --border-light: #e5e7eb;
            --accent-red: #B12704;
            --accent-green: #007600;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-main);
            margin: 0; padding: 0;
            line-height: 1.6;
        }
        header {
            background: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0; z-index: 1000;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .logo { font-family: 'Outfit'; font-weight: 800; font-size: 1.5rem; color: var(--amazon-navy); text-decoration: none; }
        .logo span { color: var(--amazon-orange); }
        
        main { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; }
        .article-card { background: white; border-radius: 16px; padding: 3rem 8%; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        h1 { font-family: 'Outfit'; font-size: 2.8rem; line-height: 1.1; margin: 0 0 2rem 0; color: #000; letter-spacing: -0.02em; }
        h2 { font-family: 'Outfit'; font-size: 1.8rem; margin: 3rem 0 1.5rem 0; border-bottom: 2px solid var(--bg-gray); padding-bottom: 0.5rem; }
        
        /* The ATF Block is injected directly via generator and styled there */
        /* The Product blocks are injected directly via generator and styled there */

        .section-break { margin: 4rem 0; }
        
        .footer-cta {
            background: #1a202c;
            color: white;
            padding: 3rem;
            border-radius: 16px;
            margin-top: 4rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .article-card { padding: 2rem 6%; }
        }
    </style>
</head>
<body>
    <header>
        <a href="../index.html" class="logo">Expertos<span>Aire</span></a>
    </header>
    <main>
        <article class="article-card">
            <h1>{{ h1 }}</h1>
            {{ atf_box }}
            <div class="article-body">
                {{ content }}
            </div>
            
            <div class="footer-cta">
                <h2>¿Listo para mejorar tu aire?</h2>
                <p>No dejes que una mala elección afecte a tu salud o a tu presupuesto.</p>
                <a href="{{ best_link }}" style="display:inline-block; background:#FF9900; color:white; padding:18px 45px; border-radius:8px; text-decoration:none; font-weight:800; font-size:1.2rem; margin-top:1.5rem;">Ver oferta actual de {{ best_name }}</a>
            </div>
        </article>
    </main>
</body>
</html>
